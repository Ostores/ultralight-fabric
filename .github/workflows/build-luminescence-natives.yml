name: Build & publish Ultralight natives (Mac/Linux)

# Compile le pont JNI Luminescence pour Linux/macOS contre le SDK Ultralight 1.4.0,
# assemble un PACK prêt à l'emploi (bin/ {libs Ultralight + LuminescenceJNI} + resources/),
# et le PUBLIE automatiquement sur la release `natives-1.4.0` (téléchargée au runtime par le mod).
#
# Windows n'est pas buildé ici (VS 2026 absent des runners GitHub-hosted) : le pack
# `ultralight-natives-windows-x64.zip` est assemblé localement et uploadé à la main sur la
# même release.
#
# Lancement : onglet Actions → ce workflow → Run workflow.

on:
  workflow_dispatch:

permissions:
  contents: write   # pour créer/mettre à jour la release des natifs

env:
  LUMINESCENCE_REF: "v2026.1.0"
  ULTRALIGHT_SDK_VERSION: "1.4.0"

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-24.04
            sdk_asset: ultralight-free-sdk-1.4.0-linux-x64.7z
            lib: libLuminescenceJNI.so
          - platform: macos-arm64
            runner: macos-14
            sdk_asset: ultralight-free-sdk-1.4.0-mac-arm64.7z
            lib: libLuminescenceJNI.dylib

    steps:
      - name: Checkout Luminescence
        uses: actions/checkout@v4
        with:
          repository: Solomon-Team/Luminescence
          ref: ${{ env.LUMINESCENCE_REF }}

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
          cache: gradle

      - name: Install 7-Zip (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Install 7-Zip (macOS)
        if: runner.os == 'macOS'
        run: brew install sevenzip

      - name: Download Ultralight 1.4 SDK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$RUNNER_TEMP/ultralight-sdk"
          gh release download "$ULTRALIGHT_SDK_VERSION" \
            --repo Ayydxn/Voxellight-Ultralight-SDKs \
            --pattern "${{ matrix.sdk_asset }}" \
            --output "$RUNNER_TEMP/sdk.7z"
          if command -v 7z >/dev/null 2>&1; then 7z x "$RUNNER_TEMP/sdk.7z" -o"$RUNNER_TEMP/ultralight-sdk" -y;
          else 7zz x "$RUNNER_TEMP/sdk.7z" -o"$RUNNER_TEMP/ultralight-sdk" -y; fi

      - name: Generate JNI headers
        run: |
          chmod +x ./gradlew
          ./gradlew generateJniHeaders --no-daemon

      # Sur Unix, les libs Ultralight sont dans bin/, pas lib/ (où le CMake pointe par défaut).
      - name: Patch CMake link dir for Unix SDK layout
        run: |
          f=src/main/native/CMakeLists.txt
          sed 's#${ULTRALIGHT_SDK}/lib#${ULTRALIGHT_SDK}/bin#' "$f" > "$f.tmp" && mv "$f.tmp" "$f"

      # `static constexpr JNINativeMethod[]` { (void*)func } n'est pas une constant expression
      # pour GCC/Clang (MSVC tolère). constexpr -> const (init dynamique, identique).
      - name: Patch source for GCC/Clang (non-constexpr JNI tables)
        run: |
          grep -rl 'static constexpr JNINativeMethod' src/main/native \
            | xargs perl -i -pe 's/static constexpr JNINativeMethod/static const JNINativeMethod/g'

      - name: CMake configure
        run: |
          # Source MSVC-only : force-include des en-têtes std manquants (size/unique_lock/strlen…).
          FORCE_INCLUDES="-include cstddef -include cstdint -include cstring -include cstdio -include cmath -include string -include vector -include array -include algorithm -include iterator -include mutex -include memory -include functional -include stdexcept"
          cmake -S src/main/native -B build/cmake-build \
            -DJNI_HEADER_DIR="$(pwd)/build/jni-headers" \
            -DULTRALIGHT_SDK="$RUNNER_TEMP/ultralight-sdk" \
            -DPLATFORM="${{ matrix.platform }}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DLUMINESCENCE_TRACY=OFF \
            -DCMAKE_CXX_FLAGS="$FORCE_INCLUDES" \
            -G "Unix Makefiles"

      - name: CMake build
        run: cmake --build build/cmake-build --config Release --parallel

      # Embarque les deps système partagées des libs Ultralight (ex. libbz2) dans bin/, pour les
      # runtimes minimaux / sandbox Flatpak où elles manquent (UnsatisfiedLinkError libWebCore →
      # libbz2.so.1.0). Le loader du mod les précharge avant le SDK. On EXCLUT la glibc, la
      # toolchain (libstdc++/libgcc_s) et les libs d'affichage (GL/X/wayland/drm) : elles doivent
      # venir du système/hôte (bundlées, elles entreraient en conflit).
      - name: Bundle Linux runtime deps
        if: runner.os == 'Linux'
        run: |
          SDKBIN="$RUNNER_TEMP/ultralight-sdk/bin"
          JNI="build/cmake-build/${{ matrix.lib }}"
          DENY='^(linux-vdso|ld-linux.*|libc|libm|libdl|libpthread|librt|libresolv|libutil|libnsl|libstdc\+\+|libgcc_s|libGL|libGLX|libGLdispatch|libEGL|libOpenGL|libX11|libxcb|libXau|libXdmcp|libdrm|libgbm|libwayland.*)\.so'
          bundle_one() {
            ldd "$1" 2>/dev/null | awk '$2=="=>"{print $1" "$3}' | while read -r soname path; do
              [ -z "$path" ] && continue
              [ "$path" = "not" ] && continue          # "=> not found"
              case "$soname" in */*) continue;; esac    # nom = chemin absolu → ignore
              echo "$soname" | grep -Eq "$DENY" && continue
              if [ ! -e "$SDKBIN/$soname" ] && [ -e "$path" ]; then
                cp -L "$path" "$SDKBIN/$soname"
                echo "  bundled: $soname  <- $path"
              fi
            done
          }
          for l in "$SDKBIN"/libWebCore.so "$SDKBIN"/libUltralight.so "$SDKBIN"/libUltralightCore.so "$SDKBIN"/libAppCore.so "$JNI"; do
            [ -e "$l" ] && { echo "== ldd $(basename "$l") =="; bundle_one "$l"; }
          done
          echo "bin/ après bundling :"; ls -la "$SDKBIN"

      # Pack runtime : bin/ {libs Ultralight + LuminescenceJNI + deps bundlées} + resources/.
      - name: Assemble natives pack
        run: |
          PACK="$RUNNER_TEMP/pack"
          mkdir -p "$PACK/bin" "$PACK/resources"
          cp "$RUNNER_TEMP"/ultralight-sdk/bin/* "$PACK/bin/"
          cp "build/cmake-build/${{ matrix.lib }}" "$PACK/bin/"
          cp "$RUNNER_TEMP"/ultralight-sdk/resources/* "$PACK/resources/"
          ( cd "$PACK" && zip -r "$RUNNER_TEMP/ultralight-natives-${{ matrix.platform }}.zip" bin resources )
          echo "Pack bin/:"; ls -la "$PACK/bin"

      - name: Upload pack artifact
        uses: actions/upload-artifact@v4
        with:
          name: ultralight-natives-${{ matrix.platform }}
          path: ${{ runner.temp }}/ultralight-natives-${{ matrix.platform }}.zip
          if-no-files-found: error

  publish:
    name: Publish packs to release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download all packs
        uses: actions/download-artifact@v4
        with:
          pattern: ultralight-natives-*
          path: packs
          merge-multiple: true

      - name: Upload to release natives-1.4.0
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ls -la packs
          gh release view natives-1.4.0 --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create natives-1.4.0 --repo "$GITHUB_REPOSITORY" \
                 --title "Ultralight 1.4 natives" \
                 --notes "Per-platform native packs (Ultralight 1.4 SDK + LuminescenceJNI), downloaded at runtime by the mod. Windows pack uploaded manually."
          gh release upload natives-1.4.0 --repo "$GITHUB_REPOSITORY" packs/*.zip --clobber
